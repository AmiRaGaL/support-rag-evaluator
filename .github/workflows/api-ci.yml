name: API CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  api:
    name: API build and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: postgresql://support_rag_user:support_rag_password@localhost:5432/support_rag_test?schema=public
      NODE_ENV: test
      PORT: 3001

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: support_rag_user
          POSTGRES_PASSWORD: support_rag_password
          POSTGRES_DB: support_rag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U support_rag_user -d support_rag_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build API
        run: npm run build