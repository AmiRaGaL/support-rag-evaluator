services:
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    container_name: support-rag-web
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:3001
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      target: runtime
    container_name: support-rag-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://support_rag_user:support_rag_password@postgres:5432/support_rag_dev?schema=public
      NODE_ENV: production
      PORT: 3001
      LLM_PROVIDER: deterministic
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  api-migrate:
    build:
      context: ./apps/api
      target: migrate
    profiles:
      - tools
    environment:
      DATABASE_URL: postgresql://support_rag_user:support_rag_password@postgres:5432/support_rag_dev?schema=public
      NODE_ENV: production
      LLM_PROVIDER: deterministic
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run prisma:migrate:deploy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: support-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: support_rag_user
      POSTGRES_PASSWORD: support_rag_password
      POSTGRES_DB: support_rag_dev
    ports:
      - "5433:5432"
    volumes:
      - support_rag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_rag_user -d support_rag_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  support_rag_postgres_data:
